<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeerDrop | StackBase</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #007bff; --bg: #f4f7f6; --text: #333; --card: #fff; }
        body { font-family: system-ui, -apple-system, sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { margin-top: 0; color: var(--primary); }
        .box { background: var(--bg); padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; flex-direction: column; align-items: center;}
        .id-text { font-size: 1.2rem; font-weight: bold; letter-spacing: 2px; color: var(--primary); margin-bottom: 15px; word-break: break-all;}
        input[type="text"], input[type="file"] { width: calc(100% - 20px); padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; }
        button { background: var(--primary); color: white; border: none; padding: 12px 20px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
        button:hover { background: #0056b3; }
        #qrcode { margin-top: 10px; padding: 10px; background: white; border-radius: 8px; }
        progress { width: 100%; height: 20px; margin-top: 15px; border-radius: 5px; }
        #status { font-size: 0.9rem; margin-top: 15px; font-weight: bold; color: #666; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>LocalShare Pro</h1>
    
    <div id="identity-section" class="box">
        <p style="margin: 0 0 10px 0;">Your Device ID:</p>
        <div class="id-text" id="my-id">Generating...</div>
        <div id="qrcode"></div>
        <p style="font-size: 0.8rem; color: #666;">Scan to connect directly</p>
    </div>

    <div id="connect-section">
        <input type="text" id="target-id" placeholder="Enter friend's Device ID">
        <button id="connect-btn" onclick="connectToPeer()">Connect</button>
    </div>

    <div id="share-section" class="hidden">
        <input type="file" id="file-input">
        <button id="send-btn" onclick="sendFile()">Send File</button>
        <progress id="progress-bar" value="0" max="100" class="hidden"></progress>
    </div>

    <div id="status">Waiting for connection...</div>
</div>

<script>
    // 1. Upgrade: Explicitly define STUN servers for better mobile connectivity
    const peer = new Peer({
        config: {
            'iceServers': [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        },
        debug: 1 // Logs info to the browser console if you need to troubleshoot
    });

    // Register Service Worker for PWA installability
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Service Worker registered!', reg))
                .catch(err => console.error('Service Worker registration failed:', err));
        });
    }
    
    let conn; 

    // File receiving variables
    let receivingFile = [];
    let receivingFileSize = 0;
    let receivingFileName = '';
    let receivingFileType = '';
    let receivedSize = 0;

    const statusEl = document.getElementById('status');
    const connectSection = document.getElementById('connect-section');
    const shareSection = document.getElementById('share-section');
    const identitySection = document.getElementById('identity-section');
    const progressBar = document.getElementById('progress-bar');

    // 2. Setup ID and QR Code
    peer.on('open', (id) => {
        document.getElementById('my-id').innerText = id;
        
        const shareUrl = window.location.href.split('?')[0] + '?connect=' + id;
        
        new QRCode(document.getElementById("qrcode"), {
            text: shareUrl,
            width: 128,
            height: 128
        });

        const urlParams = new URLSearchParams(window.location.search);
        const connectId = urlParams.get('connect');
        if (connectId) {
            document.getElementById('target-id').value = connectId;
            // Add a tiny delay to ensure the browser is fully ready before connecting
            setTimeout(connectToPeer, 500); 
        }
    });

    // 3. Catch Global Peer Errors (Crucial for debugging!)
    peer.on('error', (err) => {
        console.error("PeerJS Error:", err);
        statusEl.innerText = `Error: ${err.type}`;
        statusEl.style.color = "red";
    });

    // 4. Listen for INCOMING connections
    peer.on('connection', (connection) => {
        conn = connection;
        setupConnection();
    });

    // 5. Initiate OUTGOING connection
    function connectToPeer() {
        const targetId = document.getElementById('target-id').value.trim();
        if (!targetId) return alert("Please enter an ID");
        
        statusEl.innerText = "Connecting...";
        statusEl.style.color = "#666";
        
        // Upgrade: Force reliable data transfer
        conn = peer.connect(targetId, { reliable: true });
        setupConnection();
    }

    // 6. Handle connection and file RECEIVING logic
    function setupConnection() {
        conn.on('open', () => {
            statusEl.innerText = "Connected! Ready to share.";
            statusEl.style.color = "green";
            connectSection.classList.add('hidden');
            identitySection.classList.add('hidden'); 
            shareSection.classList.remove('hidden');
        });

        conn.on('data', (data) => {
            if (data.type === 'header') {
                receivingFile = [];
                receivedSize = 0;
                receivingFileSize = data.filesize;
                receivingFileName = data.filename;
                receivingFileType = data.filetype;
                
                progressBar.classList.remove('hidden');
                progressBar.value = 0;
                statusEl.innerText = `Receiving: ${data.filename}...`;

            } else if (data.type === 'chunk') {
                receivingFile.push(data.data);
                receivedSize += data.data.byteLength;
                progressBar.value = (receivedSize / receivingFileSize) * 100;

            } else if (data.type === 'done') {
                const blob = new Blob(receivingFile, { type: receivingFileType });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = receivingFileName;
                a.click();
                
                URL.revokeObjectURL(url);
                statusEl.innerText = "File received successfully!";
                setTimeout(() => progressBar.classList.add('hidden'), 2000);
            }
        });

        conn.on('close', () => {
            statusEl.innerText = "Connection lost. Refresh to reconnect.";
            statusEl.style.color = "red";
            shareSection.classList.add('hidden');
        });

        // Catch connection-specific errors
        conn.on('error', (err) => {
            statusEl.innerText = "Connection failed!";
            statusEl.style.color = "red";
            console.error("Connection Error:", err);
        });
    }

    // 7. File SENDING logic
    function sendFile() {
        const fileInput = document.getElementById('file-input');
        const file = fileInput.files[0];

        if (!file) return alert("Please select a file first.");
        if (conn && conn.open) {
            progressBar.classList.remove('hidden');
            progressBar.value = 0;
            statusEl.innerText = `Sending ${file.name}...`;
            
            conn.send({
                type: 'header',
                filename: file.name,
                filetype: file.type,
                filesize: file.size
            });

            let offset = 0;
            const chunkSize = 64 * 1024; 

            function readSlice() {
                const slice = file.slice(offset, offset + chunkSize);
                const reader = new FileReader();
                
                reader.onload = (e) => {
                    conn.send({ type: 'chunk', data: e.target.result });
                    offset += slice.size;
                    progressBar.value = (offset / file.size) * 100;
                    
                    if (offset < file.size) {
                        if (conn.dataChannel.bufferedAmount > 1024 * 1024) {
                            setTimeout(readSlice, 50); 
                        } else {
                            readSlice();
                        }
                    } else {
                        conn.send({ type: 'done' });
                        statusEl.innerText = "File sent successfully!";
                        setTimeout(() => progressBar.classList.add('hidden'), 2000);
                    }
                };
                reader.readAsArrayBuffer(slice);
            }
            readSlice(); 
        } else {
            alert("No active connection.");
        }
    }
</script>

</body>
</html>
