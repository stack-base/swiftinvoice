<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeerDrop | Fast P2P Sharing</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* Base Light Theme */
        :root { 
            --primary: #007bff; 
            --bg: #f4f7f6; 
            --text: #333; 
            --card: #fff; 
            --input-bg: #fff;
            --border: #ccc;
        }

        /* Dark Theme Overrides */
        body.dark-mode {
            --bg: #121212;
            --text: #e0e0e0;
            --card: #1e1e1e;
            --input-bg: #2d2d2d;
            --border: #444;
        }

        body { font-family: system-ui, -apple-system, sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; transition: background-color 0.3s; }
        .container { background: var(--card); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center; transition: background-color 0.3s; }
        
        /* Header Flexbox for Dark Mode Button */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { margin: 0; color: var(--primary); }
        
        .box { background: var(--bg); padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; transition: background-color 0.3s;}
        
        /* ID & Copy Button Flexbox */
        .id-container { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; justify-content: center; flex-wrap: wrap;}
        .id-text { font-size: 1.2rem; font-weight: bold; letter-spacing: 1px; color: var(--primary); word-break: break-all;}
        
        input[type="text"], input[type="file"] { width: calc(100% - 20px); padding: 10px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--input-bg); color: var(--text); }
        
        button { background: var(--primary); color: white; border: none; padding: 12px 20px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
        button:hover { background: #0056b3; }
        
        /* Utility Buttons */
        .btn-small { width: auto; padding: 6px 12px; margin: 0; font-size: 0.85rem; background: #6c757d; }
        .btn-small:hover { background: #5a6268; }
        .btn-icon { width: auto; padding: 8px; margin: 0; background: transparent; border: 1px solid var(--border); color: var(--text); font-size: 1.2rem; border-radius: 50%; display: flex; align-items: center; justify-content: center;}
        .btn-icon:hover { background: var(--bg); }

        /* QR Code needs a white background to remain scannable in dark mode */
        #qrcode { margin-top: 10px; padding: 10px; background: white; border-radius: 8px; }
        
        progress { width: 100%; height: 20px; margin-top: 15px; border-radius: 5px; }
        #status { font-size: 0.9rem; margin-top: 15px; font-weight: bold; color: #888; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>PeerDrop</h1>
        <button class="btn-icon" onclick="toggleDarkMode()" title="Toggle Dark Mode">🌓</button>
    </div>
    
    <div id="identity-section" class="box">
        <p style="margin: 0 0 10px 0;">Your Device ID:</p>
        <div class="id-container">
            <div class="id-text" id="my-id">Generating...</div>
            <button id="copy-btn" class="btn-small hidden" onclick="copyId()">Copy</button>
        </div>
        <div id="qrcode"></div>
        <p style="font-size: 0.8rem; color: #888;">Scan to connect directly</p>
    </div>

    <div id="connect-section">
        <input type="text" id="target-id" placeholder="Enter friend's Device ID">
        <button id="connect-btn" onclick="connectToPeer()">Connect</button>
    </div>

    <div id="share-section" class="hidden">
        <input type="file" id="file-input">
        <button id="send-btn" onclick="sendFile()">Send File</button>
        <progress id="progress-bar" value="0" max="100" class="hidden"></progress>
    </div>

    <div id="status">Waiting for connection...</div>
</div>

<script>
    // --- UI Logic (Dark Mode & Copy) ---
    
    // Check local storage for dark mode preference on load
    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
    }

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('darkMode', isDark);
    }

    function copyId() {
        const idText = document.getElementById('my-id').innerText;
        navigator.clipboard.writeText(idText).then(() => {
            const copyBtn = document.getElementById('copy-btn');
            copyBtn.innerText = 'Copied!';
            copyBtn.style.background = '#28a745'; // Green success color
            setTimeout(() => {
                copyBtn.innerText = 'Copy';
                copyBtn.style.background = '#6c757d'; // Revert to gray
            }, 2000);
        }).catch(err => {
            console.error('Failed to copy text: ', err);
            alert("Could not copy ID. Please copy manually.");
        });
    }


    // --- Core WebRTC Logic ---

    const peer = new Peer({
        config: {
            'iceServers': [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        },
        debug: 1 
    });

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Service Worker registered!'))
                .catch(err => console.error('Service Worker registration failed:', err));
        });
    }
    
    let conn; 
    let receivingFile = [];
    let receivingFileSize = 0;
    let receivingFileName = '';
    let receivingFileType = '';
    let receivedSize = 0;

    const statusEl = document.getElementById('status');
    const connectSection = document.getElementById('connect-section');
    const shareSection = document.getElementById('share-section');
    const identitySection = document.getElementById('identity-section');
    const progressBar = document.getElementById('progress-bar');
    const copyBtn = document.getElementById('copy-btn');

    peer.on('open', (id) => {
        document.getElementById('my-id').innerText = id;
        copyBtn.classList.remove('hidden'); // Show copy button once ID is generated
        
        const shareUrl = window.location.href.split('?')[0] + '?connect=' + id;
        
        new QRCode(document.getElementById("qrcode"), {
            text: shareUrl,
            width: 128,
            height: 128
        });

        const urlParams = new URLSearchParams(window.location.search);
        const connectId = urlParams.get('connect');
        if (connectId) {
            document.getElementById('target-id').value = connectId;
            setTimeout(connectToPeer, 500); 
        }
    });

    peer.on('error', (err) => {
        console.error("PeerJS Error:", err);
        statusEl.innerText = `Error: ${err.type}`;
        statusEl.style.color = "red";
    });

    peer.on('connection', (connection) => {
        conn = connection;
        setupConnection();
    });

    function connectToPeer() {
        const targetId = document.getElementById('target-id').value.trim();
        if (!targetId) return alert("Please enter an ID");
        
        statusEl.innerText = "Connecting...";
        statusEl.style.color = "#888";
        
        conn = peer.connect(targetId, { reliable: true });
        setupConnection();
    }

    function setupConnection() {
        conn.on('open', () => {
            statusEl.innerText = "Connected! Ready to share.";
            statusEl.style.color = "#28a745";
            connectSection.classList.add('hidden');
            identitySection.classList.add('hidden'); 
            shareSection.classList.remove('hidden');
        });

        conn.on('data', (data) => {
            if (data.type === 'header') {
                receivingFile = [];
                receivedSize = 0;
                receivingFileSize = data.filesize;
                receivingFileName = data.filename;
                receivingFileType = data.filetype;
                
                progressBar.classList.remove('hidden');
                progressBar.value = 0;
                statusEl.innerText = `Receiving: ${data.filename}...`;

            } else if (data.type === 'chunk') {
                receivingFile.push(data.data);
                receivedSize += data.data.byteLength;
                progressBar.value = (receivedSize / receivingFileSize) * 100;

            } else if (data.type === 'done') {
                const blob = new Blob(receivingFile, { type: receivingFileType });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = receivingFileName;
                a.click();
                
                URL.revokeObjectURL(url);
                statusEl.innerText = "File received successfully!";
                setTimeout(() => progressBar.classList.add('hidden'), 2000);
            }
        });

        conn.on('close', () => {
            statusEl.innerText = "Connection lost. Refresh to reconnect.";
            statusEl.style.color = "red";
            shareSection.classList.add('hidden');
        });

        conn.on('error', (err) => {
            statusEl.innerText = "Connection failed!";
            statusEl.style.color = "red";
            console.error("Connection Error:", err);
        });
    }

    function sendFile() {
        const fileInput = document.getElementById('file-input');
        const file = fileInput.files[0];

        if (!file) return alert("Please select a file first.");
        if (conn && conn.open) {
            progressBar.classList.remove('hidden');
            progressBar.value = 0;
            statusEl.innerText = `Sending ${file.name}...`;
            
            conn.send({
                type: 'header',
                filename: file.name,
                filetype: file.type,
                filesize: file.size
            });

            let offset = 0;
            const chunkSize = 64 * 1024; 

            function readSlice() {
                const slice = file.slice(offset, offset + chunkSize);
                const reader = new FileReader();
                
                reader.onload = (e) => {
                    conn.send({ type: 'chunk', data: e.target.result });
                    offset += slice.size;
                    progressBar.value = (offset / file.size) * 100;
                    
                    if (offset < file.size) {
                        if (conn.dataChannel.bufferedAmount > 1024 * 1024) {
                            setTimeout(readSlice, 50); 
                        } else {
                            readSlice();
                        }
                    } else {
                        conn.send({ type: 'done' });
                        statusEl.innerText = "File sent successfully!";
                        setTimeout(() => progressBar.classList.add('hidden'), 2000);
                        fileInput.value = ''; // Clear the input after sending
                    }
                };
                reader.readAsArrayBuffer(slice);
            }
            readSlice(); 
        } else {
            alert("No active connection.");
        }
    }
</script>

</body>
</html>
