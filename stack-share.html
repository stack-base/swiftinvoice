<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P LocalShare</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #007bff; --bg: #f4f7f6; --text: #333; --card: #fff; }
        body { font-family: system-ui, -apple-system, sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { margin-top: 0; color: var(--primary); }
        .box { background: var(--bg); padding: 15px; border-radius: 8px; margin-bottom: 20px; word-break: break-all; }
        .id-text { font-size: 1.2rem; font-weight: bold; letter-spacing: 2px; color: var(--primary); }
        input[type="text"], input[type="file"] { width: calc(100% - 20px); padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; }
        button { background: var(--primary); color: white; border: none; padding: 12px 20px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { font-size: 0.9rem; margin-top: 15px; font-weight: bold; color: #666; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>LocalShare P2P</h1>
    
    <div class="box">
        <p>Your Device ID:</p>
        <div class="id-text" id="my-id">Generating...</div>
    </div>

    <div id="connect-section">
        <input type="text" id="target-id" placeholder="Enter friend's Device ID">
        <button id="connect-btn" onclick="connectToPeer()">Connect</button>
    </div>

    <div id="share-section" class="hidden">
        <input type="file" id="file-input">
        <button id="send-btn" onclick="sendFile()">Send File</button>
    </div>

    <div id="status">Waiting for connection...</div>
</div>

<script>
    // Initialize PeerJS. It connects to a free public signaling server automatically.
    const peer = new Peer();
    let conn; // Variable to hold the connection

    const statusEl = document.getElementById('status');
    const connectSection = document.getElementById('connect-section');
    const shareSection = document.getElementById('share-section');

    // 1. Generate and display our ID
    peer.on('open', (id) => {
        document.getElementById('my-id').innerText = id;
    });

    // 2. Listen for INCOMING connections
    peer.on('connection', (connection) => {
        conn = connection;
        setupConnection();
    });

    // 3. Initiate an OUTGOING connection
    function connectToPeer() {
        const targetId = document.getElementById('target-id').value.trim();
        if (!targetId) return alert("Please enter an ID");
        
        statusEl.innerText = "Connecting...";
        conn = peer.connect(targetId);
        setupConnection();
    }

    // 4. Handle the connection events (used by both sender and receiver)
    function setupConnection() {
        conn.on('open', () => {
            statusEl.innerText = "Connected! Ready to share.";
            statusEl.style.color = "green";
            connectSection.classList.add('hidden');
            shareSection.classList.remove('hidden');
        });

        // Listen for incoming data (files)
        conn.on('data', (data) => {
            if (data.type === 'file') {
                statusEl.innerText = "Receiving file...";
                
                // Convert the received ArrayBuffer/Blob back into a downloadable file
                const blob = new Blob([data.file], { type: data.filetype });
                const url = URL.createObjectURL(blob);
                
                // Create a temporary link to trigger the download
                const a = document.createElement('a');
                a.href = url;
                a.download = data.filename;
                a.click();
                
                URL.revokeObjectURL(url); // Clean up memory
                statusEl.innerText = `Received: ${data.filename}`;
            }
        });

        conn.on('close', () => {
            statusEl.innerText = "Connection lost. Refresh to reconnect.";
            statusEl.style.color = "red";
            shareSection.classList.add('hidden');
        });
    }

    // 5. Send the file
    function sendFile() {
        const fileInput = document.getElementById('file-input');
        const file = fileInput.files[0];

        if (!file) return alert("Please select a file first.");
        if (conn && conn.open) {
            statusEl.innerText = `Sending ${file.name}...`;
            
            // Send the file over the P2P data channel
            conn.send({
                type: 'file',
                file: file,
                filename: file.name,
                filetype: file.type
            });
            
            statusEl.innerText = "File sent!";
        } else {
            alert("No active connection.");
        }
    }
</script>

</body>
</html>
